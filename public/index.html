<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毕业照片选择</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 密码验证页 -->
    <div id="auth-page" class="page">
        <div class="auth-card">
            <h1>🎓 毕业照片选择</h1>
            <p class="subtitle">班级纪念册照片投票</p>
            <div class="form-group">
                <input type="password" id="class-password" placeholder="请输入班级密码" maxlength="20">
                <button onclick="verifyPassword()">进入</button>
            </div>
            <p id="auth-error" class="error"></p>
        </div>
    </div>

    <!-- 姓名输入页 -->
    <div id="name-page" class="page hidden">
        <div class="auth-card">
            <h2>👤 填写你的姓名</h2>
            <p class="subtitle">请填写真实姓名，用于统计和入册</p>
            <div class="form-group">
                <input type="text" id="user-name" placeholder="请输入姓名" maxlength="20">
                <button onclick="submitName()">开始选照片</button>
            </div>
            <p id="name-error" class="error"></p>
            <button class="back-btn" onclick="backToAuth()">返回</button>
        </div>
    </div>

    <!-- 选择照片页 -->
    <div id="selector-page" class="page hidden">
        <div class="header">
            <div class="header-left">
                <span class="username" id="display-name"></span>
                <span class="deadline" id="deadline-display"></span>
            </div>
            <div class="header-right">
                <button class="btn-outline" onclick="goToDashboard()">我的选择</button>
                <button class="btn-outline" onclick="logout()">退出</button>
                <button class="btn-primary" id="submit-btn" onclick="submitSelection()" disabled>提交选择</button>
            </div>
        </div>

        <div class="filter-bar" id="filter-bar">
            <button class="filter-btn active" data-category="all" onclick="filterCategory('all')">全部</button>
            <!-- 分类按钮由 JS 动态加载 -->
        </div>

        <div class="face-search-bar" id="face-search-bar">
            <button class="btn-outline" onclick="openFaceSearchModal()">&#128269; 按人脸找照片</button>
            <p class="face-search-hint">上传一张自己的照片，快速找到所有含自己的照片</p>
        </div>

        <div class="progress-bar">
            <div class="progress-info">
                <span>已选 <strong id="selected-count">0</strong> 张</span>
                <span id="status-text"></span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="photo-grid" id="photo-grid"></div>

        <div class="load-more" id="load-more">
            <div class="spinner"></div>
            <p class="normal">加载更多...</p>
            <p class="no-more">已加载全部照片</p>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>加载照片中...</p>
        </div>

        <!-- 已选照片浮动面板 -->
        <div class="selected-panel" id="selected-panel">
            <div class="selected-panel-header" onclick="toggleSelectedPanel()">
                <span>已选 <span id="panel-count">0</span> 张</span>
                <span id="panel-toggle">▼</span>
            </div>
            <div class="selected-panel-body" id="selected-panel-body">
                <div class="selected-thumbnails" id="selected-thumbnails"></div>
            </div>
        </div>
    </div>

    <!-- 提交确认弹窗 -->
    <div class="modal-overlay hidden" id="confirm-modal">
        <div class="modal">
            <h3 id="confirm-title">确认提交</h3>
            <p id="confirm-desc">你已经选择了以下照片：</p>
            <div class="confirm-photos" id="confirm-photos"></div>
            <div class="confirm-count" id="confirm-count"></div>
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeModal()">再改改</button>
                <button class="btn-primary" id="confirm-submit-btn" onclick="confirmSubmit()" disabled>确认提交</button>
            </div>
        </div>
    </div>

    <!-- 人脸搜索弹窗 -->
    <div class="modal-overlay hidden" id="face-search-modal">
        <div class="modal">
            <h3>按人脸找照片</h3>
            <p class="privacy-hint" style="color: #666; font-size: 13px; margin: 10px 0;">
                上传照片仅用于帮你找到自己的照片，事件结束后管理员会清理人脸数据。
            </p>
            <input type="file" id="face-search-input" accept="image/*" capture="environment" style="display:none;" onchange="submitFaceSearch()">
            <div class="face-search-upload" id="face-search-upload" onclick="document.getElementById('face-search-input').click()">
                <p>点击上传或拍摄一张正面照片</p>
            </div>
            <div class="face-search-loading hidden" id="face-search-loading">
                <div class="spinner"></div>
                <p>正在查找相似照片...</p>
            </div>
            <div class="face-search-result hidden" id="face-search-result">
                <p id="face-search-status"></p>
                <div class="face-search-photos" id="face-search-photos"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-outline" onclick="closeFaceSearchModal()">关闭</button>
                <button class="btn-primary" onclick="useFaceSearchResult()">使用这些照片</button>
            </div>
        </div>
    </div>

    <!-- 大图查看器（由 photo-viewer.js 管理）-->
    <script src="js/photo-viewer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
