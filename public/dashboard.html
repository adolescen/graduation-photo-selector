<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的选择 - 毕业照片</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>📷 我的选择</h2>
            <p class="subtitle" id="user-info"></p>
        </div>

        <div id="selection-content">
            <div class="my-photos" id="my-photos"></div>
            <div class="actions" style="text-align: center; margin-bottom: 24px;">
                <button class="btn-primary" onclick="backToSelector()" style="padding: 12px 32px; font-size: 16px;">
                    修改选择
                </button>
            </div>
            <p id="update-time" style="text-align: center; color: #888; font-size: 14px;"></p>
        </div>

        <div class="empty-state hidden" id="empty-state">
            <div class="icon">📭</div>
            <p>你还没有选择照片</p>
            <button class="btn-primary" onclick="backToSelector()" style="margin-top: 16px;">
                去选照片
            </button>
        </div>
    </div>

    <script>
        const API_BASE = '';

        document.addEventListener('DOMContentLoaded', () => {
            const userName = sessionStorage.getItem('userName');
            const token = sessionStorage.getItem('sessionToken');
            if (!userName || !token) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('user-info').textContent = `${userName} 的已选照片`;
            loadMySelection(token);
        });

        function loadMySelection(token) {
            fetch(`${API_BASE}/api/users/selection`, {
                headers: { 'X-Session-Token': token }
            })
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.photoIds && data.photoIds.length > 0) {
                        renderMyPhotos(data.photoIds, token);
                        if (data.updatedAt) {
                            document.getElementById('update-time').textContent = 
                                `最后更新: ${new Date(data.updatedAt).toLocaleString('zh-CN')}`;
                        }
                    } else {
                        showEmpty();
                    }
                })
                .catch(() => showEmpty());
        }

        function renderMyPhotos(photoIds, token) {
            const container = document.getElementById('my-photos');
            container.innerHTML = '';
            
            // 递归加载所有页面，确保8张照片都能找到
            let allPhotos = [];
            let currentPage = 1;
            
            function fetchAllPages() {
                fetch(`${API_BASE}/api/photos?page=${currentPage}&limit=100`, {
                    headers: { 'X-Session-Token': token }
                })
                    .then(r => r.json())
                    .then(result => {
                        if (!result.success) {
                            showEmpty();
                            return;
                        }
                        
                        allPhotos = allPhotos.concat(result.photos);
                        
                        if (currentPage < result.totalPages) {
                            currentPage++;
                            fetchAllPages();
                        } else {
                            // 所有照片加载完成，开始匹配渲染
                            const photoMap = {};
                            allPhotos.forEach(p => photoMap[p.id] = p);
                            
                            let foundCount = 0;
                            photoIds.forEach((id, index) => {
                                const photo = photoMap[id];
                                if (!photo) return;
                                foundCount++;
                                
                                const item = document.createElement('div');
                                item.className = 'my-photo-item';
                                
                                const img = document.createElement('img');
                                img.src = photo.thumbnailUrl;
                                img.alt = photo.displayName || '';
                                
                                const num = document.createElement('div');
                                num.className = 'photo-number';
                                num.textContent = index + 1;
                                
                                item.appendChild(img);
                                item.appendChild(num);
                                
                                item.onclick = () => {
                                    const modal = document.createElement('div');
                                    modal.className = 'modal-overlay';
                                    modal.style.zIndex = '200';
                                    
                                    const modalInner = document.createElement('div');
                                    modalInner.className = 'modal preview-modal';
                                    
                                    const previewImg = document.createElement('img');
                                    previewImg.src = photo.fullUrl;
                                    previewImg.alt = photo.displayName || '';
                                    
                                    const closeBtn = document.createElement('button');
                                    closeBtn.className = 'close-btn';
                                    closeBtn.textContent = '✕';
                                    closeBtn.onclick = () => modal.remove();
                                    
                                    modalInner.appendChild(previewImg);
                                    modalInner.appendChild(closeBtn);
                                    modal.appendChild(modalInner);
                                    
                                    modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
                                    document.body.appendChild(modal);
                                };
                                
                                container.appendChild(item);
                            });
                            
                            if (foundCount === 0) {
                                showEmpty();
                            }
                        }
                    })
                    .catch(() => showEmpty());
            }
            
            fetchAllPages();
        }

        function showEmpty() {
            document.getElementById('selection-content').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
        }

        function backToSelector() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
