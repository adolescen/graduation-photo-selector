<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员看板 - 毕业照片选择</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 登录页 -->
    <div id="login-page" class="page">
        <div class="auth-card">
            <h2>🔐 管理员登录</h2>
            <p class="subtitle">请输入管理员密码</p>
            <div class="form-group">
                <input type="password" id="admin-password" placeholder="管理员密码" maxlength="20">
                <button onclick="adminLogin()">登录</button>
            </div>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <!-- 管理看板 -->
    <div id="admin-page" class="page hidden">
        <div class="admin-container">
            <div class="admin-header">
                <h2>📊 选择统计看板</h2>
                <div>
                    <button class="btn-outline" onclick="exportCSV()">📥 导出CSV</button>
                    <button class="btn-outline" onclick="logout()">退出</button>
                </div>
            </div>

            <div class="stats-cards">
                <div class="stat-card">
                    <div class="number" id="stat-total">0</div>
                    <div class="label">参与人数</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="stat-completed">0</div>
                    <div class="label">已完成</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="stat-rate">0%</div>
                    <div class="label">完成率</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="stat-deadline">-</div>
                    <div class="label">截止时间</div>
                </div>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('users')">人员选择</div>
                <div class="tab" onclick="switchTab('photos')">照片热度</div>
                <div class="tab" onclick="switchTab('import')">导入照片</div>
            </div>

            <!-- 人员选择 -->
            <div class="tab-content active" id="tab-users">
                <div class="table-container">
                    <h3>👥 人员选择情况</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>已选数量</th>
                                    <th>状态</th>
                                    <th>照片ID</th>
                                    <th>更新时间</th>
                                </tr>
                            </thead>
                            <tbody id="users-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 照片热度 -->
            <div class="tab-content" id="tab-photos">
                <div class="table-container">
                    <h3>🔥 照片选择热度</h3>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>照片</th>
                                    <th>名称</th>
                                    <th>被选择次数</th>
                                    <th>选择者</th>
                                </tr>
                            </thead>
                            <tbody id="photos-table"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- 导入照片 -->
            <div class="tab-content" id="tab-import">
                <div class="import-section">
                    <h3>🔍 自动扫描导入</h3>
                    <p style="color: #666; font-size: 14px; margin-bottom: 12px;">
                        系统将自动扫描 OSS 根目录下的所有子文件夹，每个子文件夹作为一个分类，自动导入其中的照片。<br>
                        <strong>请确保 OSS 中已创建好分类文件夹。</strong>
                    </p>
                    <button class="btn-primary" onclick="autoScan()">开始自动扫描</button>
                    <p id="scan-result" style="margin-top: 12px; color: #27ae60;"></p>
                </div>

                <div class="import-section" style="margin-top: 20px;">
                    <h3>📤 手动批量导入</h3>
                    <p style="color: #666; font-size: 14px; margin-bottom: 12px;">
                        格式：每行一张照片，格式为 <code>分类|OSS路径|显示名称(可选)</code><br>
                        示例：<code>校园服单人|江南中学毕业照/校园服单人/img_001.jpg|张三</code>
                    </p>
                    <textarea id="import-text" placeholder="校园服单人|江南中学毕业照/校园服单人/img_001.jpg&#10;校园服小组|江南中学毕业照/校园服小组/img_002.jpg&#10;篮球服单人|江南中学毕业照/篮球服单人/img_003.jpg"></textarea>
                    <button class="btn-outline" onclick="importPhotos()">手动导入</button>
                    <p id="import-result" style="margin-top: 12px; color: #27ae60;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let adminToken = '';

        // 安全辅助：HTML 转义
        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#x27;');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('admin-password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') adminLogin();
            });
        });

        function adminLogin() {
            const password = document.getElementById('admin-password').value.trim();
            const errorEl = document.getElementById('login-error');
            
            if (!password) {
                errorEl.textContent = '请输入密码';
                return;
            }

            fetch(`${API_BASE}/api/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.token) {
                    adminToken = data.token;
                    showAdminPage();
                } else {
                    errorEl.textContent = '密码错误';
                }
            })
            .catch(() => {
                errorEl.textContent = '网络错误';
            });
        }

        function showAdminPage() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('admin-page').classList.remove('hidden');
            loadStats();
            loadSettings();
        }

        function loadSettings() {
            fetch(`${API_BASE}/api/settings`)
                .then(r => r.json())
                .then(data => {
                    if (data.success && data.deadline) {
                        const d = new Date(data.deadline);
                        document.getElementById('stat-deadline').textContent = 
                            d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
                    }
                })
                .catch(() => {});
        }

        function loadStats() {
            if (!adminToken) return;
            
            fetch(`${API_BASE}/api/admin/stats`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('stat-total').textContent = data.totalUsers;
                    document.getElementById('stat-completed').textContent = data.completedUsers;
                    const rate = data.totalUsers > 0 ? Math.round((data.completedUsers / data.totalUsers) * 100) : 0;
                    document.getElementById('stat-rate').textContent = rate + '%';

                    renderUsersTable(data.userSelections);
                    renderPhotosTable(data.photoStats);
                }
            })
            .catch(() => alert('加载统计失败'));
        }

        function renderUsersTable(users) {
            const tbody = document.getElementById('users-table');
            tbody.innerHTML = '';

            users.forEach(u => {
                const isComplete = u.photoCount === 8;
                const tr = document.createElement('tr');
                
                const nameTd = document.createElement('td');
                const nameStrong = document.createElement('strong');
                nameStrong.textContent = u.name;
                nameTd.appendChild(nameStrong);
                
                const countTd = document.createElement('td');
                countTd.textContent = `${u.photoCount}/8`;
                
                const statusTd = document.createElement('td');
                const badge = document.createElement('span');
                badge.className = `badge ${isComplete ? 'badge-success' : 'badge-warning'}`;
                badge.textContent = isComplete ? '已完成' : '未完成';
                statusTd.appendChild(badge);
                
                const idsTd = document.createElement('td');
                idsTd.className = 'truncate';
                idsTd.textContent = u.photoIds.join(', ');
                
                const timeTd = document.createElement('td');
                timeTd.textContent = u.updatedAt ? new Date(u.updatedAt).toLocaleString('zh-CN') : '-';
                
                tr.appendChild(nameTd);
                tr.appendChild(countTd);
                tr.appendChild(statusTd);
                tr.appendChild(idsTd);
                tr.appendChild(timeTd);
                tbody.appendChild(tr);
            });
        }

        function renderPhotosTable(photos) {
            const tbody = document.getElementById('photos-table');
            tbody.innerHTML = '';

            const maxCount = Math.max(...photos.map(p => p.count), 1);

            photos.forEach(p => {
                const tr = document.createElement('tr');
                
                const imgTd = document.createElement('td');
                const img = document.createElement('img');
                img.src = p.ossKey.includes('http') ? p.ossKey : '';
                img.style.cssText = 'width:60px;height:80px;object-fit:cover;border-radius:4px;';
                img.alt = '';
                imgTd.appendChild(img);
                
                const nameTd = document.createElement('td');
                nameTd.textContent = p.displayName;
                
                const heatTd = document.createElement('td');
                const heatDiv = document.createElement('div');
                heatDiv.className = 'photo-heat';
                const span = document.createElement('span');
                span.textContent = `${p.count} 人`;
                const bar = document.createElement('div');
                bar.className = 'heat-bar';
                const fill = document.createElement('div');
                fill.className = 'heat-fill';
                fill.style.width = `${(p.count / maxCount) * 100}%`;
                bar.appendChild(fill);
                heatDiv.appendChild(span);
                heatDiv.appendChild(bar);
                heatTd.appendChild(heatDiv);
                
                const byTd = document.createElement('td');
                byTd.className = 'truncate';
                byTd.textContent = p.selectedBy.join(', ');
                
                tr.appendChild(imgTd);
                tr.appendChild(nameTd);
                tr.appendChild(heatTd);
                tr.appendChild(byTd);
                tbody.appendChild(tr);
            });
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        function exportCSV() {
            if (!adminToken) return;
            
            fetch(`${API_BASE}/api/admin/export`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken })
            })
            .then(r => r.blob())
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'selections.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            })
            .catch(() => alert('导出失败'));
        }

        function importPhotos() {
            const text = document.getElementById('import-text').value.trim();
            const resultEl = document.getElementById('import-result');
            
            if (!text) {
                resultEl.textContent = '请输入照片列表';
                resultEl.style.color = '#e74c3c';
                return;
            }

            const lines = text.split('\n').filter(l => l.trim());
            const photos = [];
            
            lines.forEach(line => {
                const parts = line.split('|').map(p => p.trim());
                if (parts.length >= 2) {
                    photos.push({
                        category: parts[0],
                        ossKey: parts[1],
                        displayName: parts[2] || null
                    });
                }
            });

            if (photos.length === 0) {
                resultEl.textContent = '未解析到有效数据';
                resultEl.style.color = '#e74c3c';
                return;
            }

            if (!adminToken) {
                resultEl.textContent = '请先登录';
                resultEl.style.color = '#e74c3c';
                return;
            }

            fetch(`${API_BASE}/api/admin/import-photos`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken, photos })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    resultEl.textContent = data.message;
                    resultEl.style.color = '#27ae60';
                    document.getElementById('import-text').value = '';
                } else {
                    resultEl.textContent = data.message || '导入失败';
                    resultEl.style.color = '#e74c3c';
                }
            })
            .catch(() => {
                resultEl.textContent = '网络错误';
                resultEl.style.color = '#e74c3c';
            });
        }

        function autoScan() {
            const resultEl = document.getElementById('scan-result');
            if (!adminToken) {
                resultEl.textContent = '请先登录';
                resultEl.style.color = '#e74c3c';
                return;
            }
            
            resultEl.textContent = '正在扫描 OSS，请稍候...';
            resultEl.style.color = '#4a90d9';
            
            fetch(`${API_BASE}/api/admin/auto-scan`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: adminToken })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    resultEl.innerHTML = `<strong>${escapeHtml(data.message)}</strong><br>分类: ${escapeHtml(data.categories.join(', '))}`;
                    resultEl.style.color = '#27ae60';
                } else {
                    resultEl.textContent = data.message || '扫描失败';
                    resultEl.style.color = '#e74c3c';
                }
            })
            .catch(() => {
                resultEl.textContent = '网络错误，请检查 OSS 配置';
                resultEl.style.color = '#e74c3c';
            });
        }

        function logout() {
            adminToken = '';
            // 同时清除可能存在的同学身份，避免身份混淆
            sessionStorage.removeItem('sessionToken');
            sessionStorage.removeItem('userName');
            sessionStorage.removeItem('classPassword');
            location.reload();
        }
    </script>
</body>
</html>
