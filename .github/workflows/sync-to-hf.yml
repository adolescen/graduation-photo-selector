name: Sync to Hugging Face Space

on:
  push:
    branches:
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 需要先在 Hugging Face 创建 Write 权限 token：
      # 1. 访问 https://huggingface.co/settings/tokens
      # 2. 创建 token，勾选 Write 权限
      # 3. 在 GitHub 仓库 Settings -> Secrets -> Actions 添加名为 HF_TOKEN 的 secret
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://user:${HF_TOKEN}@huggingface.co/spaces/adolescen/graduation-photo-selector.git
          git push hf master
